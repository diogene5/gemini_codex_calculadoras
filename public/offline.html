<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10212a" />
    <title>Offline | Calculadoras Clinicas PED</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #10212a 0%, #0f4966 55%, #0f7c95 100%);
        color: #f3f6f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 560px;
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 8px;
        color: #10212a;
        background: #f3f6f8;
        padding: 12px 16px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexao</h1>
      <p>As calculadoras ja visitadas continuam disponiveis no cache.</p>
      <p>Quando a internet voltar, recarregue para sincronizar a versao mais recente.</p>
      <a href="/">Voltar para o app</a>
    </main>
  </body>
</html>
